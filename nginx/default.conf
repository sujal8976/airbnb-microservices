resolver 127.0.0.11 valid=10s ipv6=off;

upstream frontend_upstream {
    zone frontend_upstream 64k;
    server frontend:80 resolve;
}

upstream user_service_upstream {
    zone user_service_upstream 64k;
    server user-service:4001 resolve;
}

upstream listing_service_upstream {
    zone listing_service_upstream 64k;
    server listing-service:4002 resolve;
}

upstream search_service_upstream {
    zone search_service_upstream 64k;
    server search-service:4003 resolve;
}

upstream booking_service_upstream {
    zone booking_service_upstream 64k;
    server booking-service:4004 resolve;
}

upstream payment_service_upstream {
    zone payment_service_upstream 64k;
    server payment-service:4005 resolve;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    location /api/user/ {
        proxy_pass http://user_service_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/listing/ {
        proxy_pass http://listing_service_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/search/ {
        proxy_pass http://search_service_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/booking/ {
        proxy_pass http://booking_service_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/payment/ {
        proxy_pass http://payment_service_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}